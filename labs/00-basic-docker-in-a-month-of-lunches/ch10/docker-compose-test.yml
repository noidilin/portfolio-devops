services:
  todo-web:
    ports:
      - "${TODO_WEB_PORT}:8080"
    environment:
      - Database:Provider=Postgres
    networks:
      - app-net

  todo-db:
    image: diamol/postgres:2e-12
    ports:
      - "${TODO_DB_PORT}:5432"
    networks:
      - app-net

    # mount named volume into container at `/data`
    volumes:
      - "todo-database:/data"
    # tell PostgreSQL to use `/data` as its data directory
    environment:
      - PGDATA=/data

networks:
  app-net:
    name: todo-test

secrets:
  todo-db-connection:
    file: ./config/secrets.json

# declare a docker named volume
volumes:
  todo-database:
