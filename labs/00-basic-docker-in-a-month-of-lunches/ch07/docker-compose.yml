# This is the app definition for running in dev.
# It uses a Sqlite database inside the web app container.
services:
  todo-db:
    image: diamol/postgres:2e-12
    networks:
      - app-net

    # auto restart
    restart: unless-stopped
    # PostgreSQL environment var
    environment:
      - PGDATA=/var/lib/postgresql/data
    # target needs to match PGDATA
    volumes:
      - type: bind
        source: ./data
        target: /var/lib/postgresql/data

  todo-web:
    image: diamol/ch06-todo-list:2e
    ports:
      - "8050:8080"
    networks:
      - app-net

    # auto restart
    restart: unless-stopped
    # db needs to be started first
    depends_on:
      - todo-db
    # the env setup from previous example
    environment:
      - Database:Provider=Postgres
    # load the secrets from host filesystem
    secrets:
      - source: postgres-connection
        target: /app/config/secrets.json

# copy from the exercise example
secrets:
  postgres-connection:
    file: ./config/secrets.json

networks:
  app-net:
    name: nat
    external: true
